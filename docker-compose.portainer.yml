# DocuSeal with Pro Features - Portainer Stack
# Simple SQLite-based deployment (no external database needed)

services:
  app:
    # Build custom image with Pro features
    build:
      context: .
      dockerfile: Dockerfile.custom
    ports:
      - "3000:3000"
    volumes:
      - docuseal_data:/data/docuseal
    environment:
      # Pro Features - Set your custom branding
      - PRODUCT_NAME=${PRODUCT_NAME:-MySignApp}
      - HIDE_POWERED_BY=${HIDE_POWERED_BY:-false}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS:-noreply@yourdomain.com}
      - PRODUCT_EMAIL_URL=${PRODUCT_EMAIL_URL:-https://www.yourdomain.com}
      # App Settings
      - HOST=${HOST:-localhost}
      - FORCE_SSL=${FORCE_SSL:-}
      - APP_URL=${APP_URL:-http://localhost:3000}
      # Security (CHANGE THESE IN PRODUCTION!)
      - SECRET_KEY_BASE=${SECRET_KEY_BASE:-change_me_in_production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # Storage (local or S3)
      - ACTIVE_STORAGE_SERVICE=${ACTIVE_STORAGE_SERVICE:-local}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      # SMTP Settings (optional but recommended for emails)
      - SMTP_ADDRESS=${SMTP_ADDRESS:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER_NAME=${SMTP_USER_NAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_DOMAIN=${SMTP_DOMAIN:-}
      # Optional: Redis for background jobs (uncomment if needed)
      # - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped

  # Optional: Redis for caching/background jobs (uncomment to enable)
  # redis:
  #   image: redis:7-alpine
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

  # Optional: Caddy reverse proxy for HTTPS
  # Uncomment and configure with your domain for SSL
  # caddy:
  #   image: caddy:latest
  #   command: caddy reverse-proxy --from ${HOST:-localhost} --to app:3000
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "443:443/udp"
  #   volumes:
  #     - caddy_data:/data/caddy
  #     - caddy_config:/config
  #   environment:
  #     - HOST=${HOST:-yourdomain.com}
  #   restart: unless-stopped

volumes:
  docuseal_data:

